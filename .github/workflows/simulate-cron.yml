name: Simulate sensor (scheduled)

on:
  schedule:
    # Runs every minute — change to your desired cadence
    - cron: '*/1 * * * *'
  workflow_dispatch: {}

jobs:
  send-simulator:
    runs-on: ubuntu-latest
    concurrency:
      group: 'simulator-send'
      cancel-in-progress: true
    steps:
      - name: Call simulator endpoint
        env:
          SIMULATOR_URL: ${{ secrets.SIMULATOR_URL }}
        run: |
          if [ -z "$SIMULATOR_URL" ]; then
            echo "ERROR: SIMULATOR_URL secret is not set"
            exit 1
          fi
          echo "Posting to $SIMULATOR_URL"
          http_response=$(curl -sS -X POST -H 'Content-Type: application/json' -d '{}' "$SIMULATOR_URL" || true)
          echo "Response: $http_response"
